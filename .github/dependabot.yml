---
version: 2
updates:
  - package-ecosystem: "terraform"
    directory: "/modules/pvtr-aws-s3"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
    labels: ["terraform", "dependencies"]
    groups:
      dependencies:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "terraform"
    directory: "/modules/pvtr-azure-blob-storage"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
    labels: ["terraform", "dependencies"]
    groups:
      dependencies:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "terraform"
    directory: "/modules/pvtr-gcp-cloud-storage"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
    labels: ["terraform", "dependencies"]
    groups:
      dependencies:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
    labels: ["github_actions", "dependencies"]
    groups:
      dependencies:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
